<html>
    <head>
        <title>Japan - the country of the rising sun : Registration</title>
        <link rel="stylesheet" href="Japan-registration.css">
    </head>
    <body>
        <main>
            <div class="registration">
                <h1>You want tour of Japan?</h1>
                <h2>Email adress</h2>
                <input type="email" class="line-input" placeholder="email@email.com">
                <h2>Password</h2>                
                <form class="password">
                    <input type="password" id="password" class="line-input" placeholder="at least 8 charcters" minlength="8" required>
                    <button type="button" id="password-show" onclick="togglePassword()">Show</button>
                </form>
                <button type="submit" class="submit">Create an account</button><br>
                <span>Already have an account?</span><nav><u><a href="Japan-login.html">Login</a></u></nav>   
            </div>
        </main>
        <script src="Japan-registration.js"></script>
    </body>
</html>
